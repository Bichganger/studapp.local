<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Подтверждение email</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">Подтвердите ваш email</div>

                <div class="card-body">
                    <!-- <div class="alert alert-success" role="alert">
                         Ссылка для подтверждения была отправлена на ваш email.
                     </div> -->

                    Пожалуйста, проверьте вашу электронную почту для получения ссылки подтверждения.
                    Если вы не получили письмо,
                    <button class="btn btn-link p-0 m-0 align-baseline" id="resendVerification">нажмите здесь, чтобы запросить другое</button>.
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script>
    // Эмуляция отправки повторного письма
    document.getElementById('resendVerification')?.addEventListener('click', function() {
        if (typeof StudApp !== 'undefined') {
            StudApp.showNotification('Ссылка для подтверждения отправлена!', 'success');
        }
    });
</script>
</body>
</html>
